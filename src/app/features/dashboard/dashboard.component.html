<div class="dashboard-layout">
  <header class="topbar">
    <span class="brand">SME Service Manager</span>
    <nav class="topbar-nav">
      <a class="nav-link" routerLink="/clients" routerLinkActive="nav-link-active">Clients</a>
      <a class="nav-link" routerLink="/services" routerLinkActive="nav-link-active">Services</a>
    </nav>
    @if (currentUser$ | async; as user) {
      <div class="user-info">
        <span class="user-name">{{ user.fullName }}</span>
        <span class="user-role" [class.admin]="user.role === 'Admin'">{{ user.role }}</span>
        <button class="btn-logout" (click)="onLogout()">Sign out</button>
      </div>
    }
  </header>

  <main class="main-content">
    <h2>Dashboard</h2>
    @if (isAdmin$ | async) {
      <p class="admin-notice">You have <strong>Admin</strong> access.</p>
    }
    <div class="quick-links">
      <a class="quick-card" routerLink="/clients">
        <span class="quick-card-title">Clients</span>
        <span class="quick-card-desc">Manage your client directory</span>
      </a>
      <a class="quick-card" routerLink="/services">
        <span class="quick-card-title">Services</span>
        <span class="quick-card-desc">Manage your service catalogue</span>
      </a>
    </div>
  </main>
</div>
