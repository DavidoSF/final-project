<div class="page-layout">
  <header class="topbar">
    <span class="brand">SME Service Manager</span>
    <nav class="topbar-nav">
      <a class="nav-link" routerLink="/appointments">← Appointments</a>
    </nav>
  </header>

  <main class="main-content">
    <div class="form-card">
      <h2>Create Appointment</h2>
      <p class="form-subtitle">Choose the client, service, staff, date, and notes.</p>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

        <div class="form-group">
          <label for="clientId">Client</label>
          <select id="clientId" formControlName="clientId">
            <option value="">Select a client</option>
            @for (client of clients; track client.id) {
              <option [value]="client.id">{{ client.fullName }} — {{ client.companyName }}</option>
            }
          </select>
        </div>

        <div class="form-group">
          <label for="serviceId">Service</label>
          <select id="serviceId" formControlName="serviceId">
            <option value="">Select a service</option>
            @for (service of services; track service.id) {
              <option [value]="service.id">{{ service.name }} — {{ service.price | currency }}</option>
            }
          </select>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="assignedStaffId">Assign staff</label>
            <select id="assignedStaffId" formControlName="assignedStaffId">
              <option value="">Leave unassigned</option>
              @for (staff of staffMembers; track staff.id) {
                <option [value]="staff.id">{{ staff.fullName }} ({{ staff.role }})</option>
              }
            </select>
          </div>

          <div class="form-group">
            <label for="scheduledDate">Scheduled date</label>
            <input id="scheduledDate" formControlName="scheduledDate" type="datetime-local" />
          </div>
        </div>

        <div class="form-group">
          <label for="notes">Notes</label>
          <textarea id="notes" formControlName="notes" rows="4" placeholder="Additional appointment details"></textarea>
        </div>

        <div class="price-panel">
          <span>Price at booking</span>
          <strong>{{ selectedPrice | currency }}</strong>
        </div>

        @if (errorMessage) {
          <div class="alert-error" role="alert">{{ errorMessage }}</div>
        }

        <div class="form-actions">
          <a class="btn-secondary" routerLink="/appointments">Cancel</a>
          <button class="btn-primary" type="submit" [disabled]="isSubmitting">
            @if (isSubmitting) {
              <span class="spinner" aria-hidden="true"></span>
              Saving…
            } @else {
              Create appointment
            }
          </button>
        </div>

      </form>
    </div>
  </main>
</div>
